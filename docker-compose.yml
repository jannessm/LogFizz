services:
  postgres:
    image: postgres:16-alpine
    container_name: clock-postgres
    environment:
      POSTGRES_USER: clock_user
      POSTGRES_PASSWORD: clock_password
      POSTGRES_DB: clock_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clock_user -d clock_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: clock-redis
    command: redis-server --appendonly yes --requirepass clock_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "clock_redis_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: clock-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: clock_user
      DB_PASSWORD: clock_password
      DB_DATABASE: clock_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: clock_redis_password
      PORT: 3000
      HOST: 0.0.0.0
      SESSION_SECRET: change-this-secret-in-production-min-32-chars-required-for-security
      NODE_ENV: development
      # Allow frontend running on localhost to connect (for development with docker backend)
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: clock-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  product:
    build:
      context: ./product
      dockerfile: Dockerfile
    container_name: clock-product
    ports:
      - "8090:80"
    environment:
      # Set APP_URL to the full URL of the deployed LogFizz web application.
      # Example: APP_URL=https://app.yourdomain.com
      # APP_URL: "https://mylogfizz.magnusso.nz"
      APP_URL: "http://localhost:5173"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
