<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <!-- Background -->
  <rect width="390" height="844" fill="#1a1a2e"/>

  <!-- Status bar -->
  <rect width="390" height="44" fill="#0f0f1a"/>
  <text x="20" y="28" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" font-weight="600">9:41</text>
  <text x="350" y="28" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.6)" text-anchor="middle">●●●</text>

  <!-- Nav bar top -->
  <rect y="44" width="390" height="52" fill="#111122"/>
  <text x="195" y="75" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">TapShift</text>
  <text x="195" y="92" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">Monday, 7 April</text>

  <!-- Button grid (2×2) -->
  <!-- Work button (active) -->
  <rect x="16" y="116" width="173" height="173" rx="20" fill="rgba(251,176,59,0.22)" stroke="rgba(251,176,59,0.5)" stroke-width="2"/>
  <circle cx="102" cy="183" r="28" fill="rgba(251,176,59,0.3)"/>
  <text x="102" y="190" font-family="system-ui,sans-serif" font-size="26" text-anchor="middle">💼</text>
  <text x="102" y="225" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.9)" text-anchor="middle">Work</text>
  <text x="102" y="245" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle">3h 42m</text>
  <!-- Pulse ring -->
  <circle cx="102" cy="183" r="36" fill="none" stroke="rgba(251,176,59,0.4)" stroke-width="2"/>

  <!-- Home Office button -->
  <rect x="201" y="116" width="173" height="173" rx="20" fill="rgba(41,171,226,0.15)"/>
  <text x="287" y="195" font-family="system-ui,sans-serif" font-size="26" text-anchor="middle">🏠</text>
  <text x="287" y="225" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.9)" text-anchor="middle">Home Office</text>
  <text x="287" y="245" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle">0h 00m</text>

  <!-- Business Trip button -->
  <rect x="16" y="301" width="173" height="173" rx="20" fill="rgba(255,255,255,0.06)"/>
  <text x="102" y="380" font-family="system-ui,sans-serif" font-size="26" text-anchor="middle">✈️</text>
  <text x="102" y="410" font-family="system-ui,sans-serif" font-size="14" font-weight="600" fill="rgba(255,255,255,0.9)" text-anchor="middle">Business Trip</text>
  <text x="102" y="430" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle">—</text>

  <!-- Add button -->
  <rect x="201" y="301" width="173" height="173" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="287" y="393" font-family="system-ui,sans-serif" font-size="30" fill="rgba(255,255,255,0.3)" text-anchor="middle">＋</text>
  <text x="287" y="420" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.25)" text-anchor="middle">Add</text>

  <!-- Balance card -->
  <rect x="16" y="492" width="358" height="110" rx="16" fill="rgba(255,255,255,0.06)"/>
  <text x="32" y="520" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">Balance this month</text>
  <text x="358" y="520" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fbb03b" text-anchor="end">+1h 12m</text>
  <!-- Progress bar bg -->
  <rect x="32" y="530" width="326" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
  <!-- Progress bar fill -->
  <rect x="32" y="530" width="212" height="6" rx="3" fill="url(#barGrad)"/>
  <defs>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#29abe2"/>
      <stop offset="100%" stop-color="#fbb03b"/>
    </linearGradient>
  </defs>
  <text x="32" y="558" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">Due today</text>
  <text x="358" y="558" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.55)" text-anchor="end">8h 00m</text>
  <text x="32" y="580" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">Yearly cumulation</text>
  <text x="358" y="580" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#29abe2" text-anchor="end">+3h 28m</text>

  <!-- Bottom nav -->
  <rect y="756" width="390" height="88" fill="#0f0f1a"/>
  <line x1="0" y1="756" x2="390" y2="756" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="65" y="790" font-family="system-ui,sans-serif" font-size="22" text-anchor="middle">⏱</text>
  <text x="65" y="810" font-family="system-ui,sans-serif" font-size="11" fill="#fbb03b" text-anchor="middle" font-weight="600">Timer</text>
  <text x="195" y="790" font-family="system-ui,sans-serif" font-size="22" text-anchor="middle">📅</text>
  <text x="195" y="810" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">History</text>
  <text x="325" y="790" font-family="system-ui,sans-serif" font-size="22" text-anchor="middle">⚙️</text>
  <text x="325" y="810" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">Settings</text>
</svg>
