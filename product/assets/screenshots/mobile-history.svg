    <rect x="70" y="324" width="42" height="42" rx="8" fill="rgba(255,255,255,0.06)"/><text x="92" y="350" fill="rgba(255,255,255,0.45)">16</text>
    <rect x="124" y="324" width="42" height="42" rx="8" fill="rgba(255,255,255,0.06)"/><text x="147" y="350" fill="rgba(255,255,255,0.45)">17</text>
    <rect x="178" y="324" width="42" height="42" rx="8" fill="rgba(255,255,255,0.06)"/><text x="202" y="350" fill="rgba(255,255,255,0.45)">18</text>
    <rect x="232" y="324" width="42" height="42" rx="8" fill="rgba(255,255,255,0.06)"/><text x="257" y="350" fill="rgba(255,255,255,0.45)">19</text>
    <rect x="286" y="324" width="42" height="42" rx="8" fill="rgba(255,255,255,0.03)"/><text x="312" y="350" fill="rgba(255,255,255,0.2)">20</text>
    <rect x="340" y="324" width="42" height="42" rx="8" fill="rgba(255,255,255,0.03)"/><text x="367" y="350" fill="rgba(255,255,255,0.2)">21</text>
