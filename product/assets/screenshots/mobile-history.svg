  <text x="32" y="536" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">April – Worked</text>
  <text x="358" y="536" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="end">58h 45m</text>
  <text x="32" y="562" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">April – Due</text>
  <text x="358" y="562" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.55)" text-anchor="end">56h 00m</text>
  <text x="32" y="576" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">Balance</text>
  <text x="358" y="576" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fbb03b" text-anchor="end">+2h 45m</text>

  <!-- Bottom nav -->
  <rect y="756" width="390" height="88" fill="#0f0f1a"/>
  <line x1="0" y1="756" x2="390" y2="756" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <text x="65" y="790" font-family="system-ui,sans-serif" font-size="22" text-anchor="middle">⏱</text>
  <text x="65" y="810" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">Timer</text>
  <text x="195" y="790" font-family="system-ui,sans-serif" font-size="22" text-anchor="middle">📅</text>
  <text x="195" y="810" font-family="system-ui,sans-serif" font-size="11" fill="#fbb03b" text-anchor="middle" font-weight="600">History</text>
  <text x="325" y="790" font-family="system-ui,sans-serif" font-size="22" text-anchor="middle">⚙️</text>
  <text x="325" y="810" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.35)" text-anchor="middle">Settings</text>
