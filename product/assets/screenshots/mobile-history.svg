  <text x="32" y="414" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,0.9)">Monday, 15 April</text>
  <rect x="32" y="424" width="294" height="1" fill="rgba(255,255,255,0.07)"/>
  <text x="32" y="450" font-family="system-ui,sans-serif" font-size="12" fill="#fbb03b">💼 Work</text>
  <text x="358" y="450" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.7)" text-anchor="end">08:00 – 16:42</text>
  <text x="32" y="474" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">Worked: 8h 12m · Due: 8h 00m</text>
  <text x="358" y="474" font-family="system-ui,sans-serif" font-size="12" fill="#29abe2" text-anchor="end">+12m</text>

