    <rect x="16" y="272" width="42" height="42" rx="8" fill="rgba(41,171,226,0.35)"/><text x="37" y="298" fill="white">8</text>
    <rect x="70" y="272" width="42" height="42" rx="8" fill="rgba(41,171,226,0.35)"/><text x="92" y="298" fill="white">9</text>
    <rect x="124" y="272" width="42" height="42" rx="8" fill="rgba(34,197,94,0.35)"/><text x="147" y="298" fill="white">10</text>
    <rect x="178" y="272" width="42" height="42" rx="8" fill="rgba(41,171,226,0.35)"/><text x="202" y="298" fill="white">11</text>
    <rect x="232" y="272" width="42" height="42" rx="8" fill="rgba(41,171,226,0.35)"/><text x="257" y="298" fill="white">12</text>
    <rect x="286" y="272" width="42" height="42" rx="8" fill="rgba(255,255,255,0.05)"/><text x="312" y="298" fill="rgba(255,255,255,0.35)">13</text>
    <rect x="340" y="272" width="42" height="42" rx="8" fill="rgba(255,255,255,0.05)"/><text x="367" y="298" fill="rgba(255,255,255,0.35)">14</text>
  </g>

