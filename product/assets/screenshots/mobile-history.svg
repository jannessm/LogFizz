<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <rect width="390" height="844" fill="#1a1a2e"/>

  <!-- Status bar -->
  <rect width="390" height="44" fill="#0f0f1a"/>
  <text x="20" y="28" font-family="system-ui,sans-serif" font-size="13" fill="rgba(255,255,255,0.7)" font-weight="600">9:41</text>

  <!-- Nav bar top -->
  <rect y="44" width="390" height="52" fill="#111122"/>
  <text x="195" y="75" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">History</text>
  <text x="195" y="92" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" text-anchor="middle">April 2025</text>

  <!-- Year / month balance card -->
  <rect x="16" y="112" width="358" height="72" rx="14" fill="rgba(255,255,255,0.06)"/>
  <text x="32" y="138" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">Yearly cumulation</text>
  <text x="358" y="138" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#fbb03b" text-anchor="end">+3h 28m</text>
  <text x="32" y="164" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.45)">Sick days this year</text>
  <text x="358" y="164" font-family="system-ui,sans-serif" font-size="12" fill="rgba(255,255,255,0.55)" text-anchor="end">1</text>

  <!-- Day-of-week headers -->
  <g font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">
    <text x="37" y="210">Mo</text><text x="92" y="210">Tu</text><text x="147" y="210">We</text>
    <text x="202" y="210">Th</text><text x="257" y="210">Fr</text><text x="312" y="210">Sa</text>
    <text x="367" y="210">Su</text>
  </g>

  <!-- Calendar week 1 -->
  <g font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">
    <rect x="16" y="220" width="42" height="42" rx="8" fill="rgba(41,171,226,0.35)"/><text x="37" y="246" fill="white">1</text>
    <rect x="70" y="220" width="42" height="42" rx="8" fill="rgba(41,171,226,0.35)"/><text x="92" y="246" fill="white">2</text>
    <rect x="124" y="220" width="42" height="42" rx="8" fill="rgba(41,171,226,0.35)"/><text x="147" y="246" fill="white">3</text>
    <rect x="178" y="220" width="42" height="42" rx="8" fill="rgba(41,171,226,0.35)"/><text x="202" y="246" fill="white">4</text>
    <rect x="232" y="220" width="42" height="42" rx="8" fill="rgba(251,176,59,0.5)"/><text x="257" y="246" fill="#1a1a2e" font-weight="700">5</text>
    <rect x="286" y="220" width="42" height="42" rx="8" fill="rgba(255,255,255,0.05)"/><text x="312" y="246" fill="rgba(255,255,255,0.35)">6</text>
    <rect x="340" y="220" width="42" height="42" rx="8" fill="rgba(255,255,255,0.05)"/><text x="367" y="246" fill="rgba(255,255,255,0.35)">7</text>
